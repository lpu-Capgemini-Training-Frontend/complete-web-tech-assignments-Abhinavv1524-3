<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Displaying Data in Tabular Format</title>
    <style>
      caption {
        text-align: center !important;
        font-size: 30px;
        font-weight: bold;
        margin-bottom: 10px;
      }
      #search-input {
        display: block;
        margin: 20px auto;
        padding: 10px;
        width: 400px;
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <!-- <h1>Displaying Data in Tabular Format</h1> -->
    <input type="text" id="search-input" placeholder="Search by title..." />

    <table border="1" id="data-table">
      <caption>
        Product Data
      </caption>
      <thead>
        <tr>
          <th>ID</th>
          <th>Title</th>
          <th>Slug</th>
          <th>Price</th>
          <th>Description</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <script src="script.js"></script>
  </body>
</html>
