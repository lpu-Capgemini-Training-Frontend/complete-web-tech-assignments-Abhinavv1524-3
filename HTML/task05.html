<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Placement Form</title>
  </head>
  <body>
    <center>
      <h3>Please complete all the information below.</h3>
    </center>

    <form action="#" method="post">
      <table align="center" cellpadding="8">
        <tr>
          <td colspan="2">Name</td>
        </tr>

        <tr>
          <td><input type="text" placeholder="First name" /></td>
          <td><input type="text" placeholder="Last name" /></td>
        </tr>

        <tr>
          <td>Contact</td>
          <td>Email</td>
        </tr>

        <tr>
          <td><input type="text" placeholder="Contact number" /></td>
          <td><input type="email" placeholder="Enter your email" /></td>
        </tr>

        <tr>
          <td colspan="2">Set password</td>
        </tr>

        <tr>
          <td colspan="2">
            <input type="password" placeholder="Enter password" />
          </td>
        </tr>

        <tr>
          <td colspan="2">Profile</td>
        </tr>

        <tr>
          <td colspan="2">
            <input type="file" />
          </td>
        </tr>

        <tr>
          <td colspan="2" align="center">
            <input type="submit" value="Submit" />
          </td>
        </tr>
      </table>
    </form>
  </body>
</html>
